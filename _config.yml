# Site Information
title: c0mmand3r | Brian Murunga
description: Cybersecurity professional sharing writeups, projects, and security research
url: "https://brianmurunga.github.io"
baseurl: ""
avatar: images/bmw_avatar.jpeg

# Author Information
author:
  name: Brian Murunga
  email: your@professional.email
  twitter: brian_murunga1
  github: brianmurunga
  linkedin: brian-murunga-wakhungu

# Site Features
disqus: c0mmander
google_analytics: UA-XXXXXX-X  # Replace with your ID

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Build Settings
theme: minima
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME